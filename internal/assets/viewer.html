<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PinchTab Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #16213e;
    width: 100%;
    border-bottom: 1px solid #0f3460;
    font-size: 13px;
  }
  #toolbar .logo { font-weight: 700; color: #e94560; }
  #toolbar .status {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #666;
  }
  #toolbar .status.connected { background: #4caf50; }
  #toolbar .status.error { background: #e94560; }
  #toolbar .info { color: #888; margin-left: auto; }
  #container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    width: 100%;
  }
  #viewer-canvas {
    cursor: default;
    max-width: 100%;
    max-height: calc(100vh - 50px);
    border: 1px solid #0f3460;
    border-radius: 4px;
    image-rendering: -webkit-optimize-contrast;
  }
  #viewer-canvas:focus { outline: 2px solid #e94560; }
  #error-msg {
    color: #e94560;
    text-align: center;
    padding: 40px;
    font-size: 16px;
  }
</style>
</head>
<body>
<div id="toolbar">
  <span class="logo">PinchTab</span>
  <span id="status" class="status"></span>
  <span id="status-text">Connecting...</span>
  <span class="info" id="fps-display"></span>
</div>
<div id="container">
  <canvas id="viewer-canvas" tabindex="0"></canvas>
</div>
<div id="error-msg" style="display:none"></div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const shareToken = params.get("token") || "";
  const tabId = params.get("tabId") || "";
  const quality = parseInt(params.get("quality") || "60", 10);
  const maxWidth = parseInt(params.get("maxWidth") || "1280", 10);
  const fps = parseInt(params.get("fps") || "15", 10);

  const canvas = document.getElementById("viewer-canvas");
  const ctx = canvas.getContext("2d");
  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("status-text");
  const fpsDisplay = document.getElementById("fps-display");
  const errorMsg = document.getElementById("error-msg");

  // Track the actual rendered image size vs canvas CSS size for coordinate mapping
  let imgWidth = 0, imgHeight = 0;
  let frameCount = 0;
  let lastFpsTime = Date.now();

  function buildWsUrl() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const base = `${proto}//${location.host}/screencast`;
    const p = new URLSearchParams();
    if (tabId) p.set("tabId", tabId);
    p.set("quality", String(quality));
    p.set("maxWidth", String(maxWidth));
    p.set("fps", String(fps));
    // Pass the main API token if present, OR the share token for auth
    const apiToken = params.get("apiToken") || "";
    if (apiToken) p.set("token", apiToken);
    else if (shareToken) p.set("token", shareToken);
    return `${base}?${p.toString()}`;
  }

  function connect() {
    const ws = new WebSocket(buildWsUrl());
    ws.binaryType = "arraybuffer";

    ws.onopen = function() {
      statusEl.className = "status connected";
      statusText.textContent = "Connected";
      canvas.focus();
    };

    ws.onclose = function() {
      statusEl.className = "status error";
      statusText.textContent = "Disconnected - reconnecting...";
      setTimeout(connect, 2000);
    };

    ws.onerror = function() {
      statusEl.className = "status error";
      statusText.textContent = "Connection error";
    };

    ws.onmessage = function(evt) {
      if (!(evt.data instanceof ArrayBuffer)) return;
      const blob = new Blob([evt.data], { type: "image/jpeg" });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = function() {
        if (canvas.width !== img.width || canvas.height !== img.height) {
          canvas.width = img.width;
          canvas.height = img.height;
        }
        imgWidth = img.width;
        imgHeight = img.height;
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);

        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime >= 1000) {
          fpsDisplay.textContent = `${frameCount} fps | ${img.width}x${img.height}`;
          frameCount = 0;
          lastFpsTime = now;
        }
      };
      img.src = url;
    };

    // --- Input event forwarding ---

    function scaleCoords(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = imgWidth / rect.width;
      const scaleY = imgHeight / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY,
      };
    }

    function sendInput(evt) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(evt));
      }
    }

    function buttonName(b) {
      if (b === 1) return "middle";
      if (b === 2) return "right";
      return "left";
    }

    canvas.addEventListener("mousemove", function(e) {
      const c = scaleCoords(e.clientX, e.clientY);
      sendInput({ type: "mousemove", x: c.x, y: c.y });
    });

    canvas.addEventListener("mousedown", function(e) {
      e.preventDefault();
      canvas.focus();
      const c = scaleCoords(e.clientX, e.clientY);
      sendInput({ type: "mousedown", x: c.x, y: c.y, button: buttonName(e.button) });
    });

    canvas.addEventListener("mouseup", function(e) {
      e.preventDefault();
      const c = scaleCoords(e.clientX, e.clientY);
      sendInput({ type: "mouseup", x: c.x, y: c.y, button: buttonName(e.button) });
    });

    canvas.addEventListener("wheel", function(e) {
      e.preventDefault();
      const c = scaleCoords(e.clientX, e.clientY);
      sendInput({ type: "scroll", x: c.x, y: c.y, deltaX: e.deltaX, deltaY: e.deltaY });
    }, { passive: false });

    canvas.addEventListener("contextmenu", function(e) { e.preventDefault(); });

    canvas.addEventListener("keydown", function(e) {
      e.preventDefault();
      // For printable single characters, use keypress type to get proper text insertion
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        sendInput({ type: "keypress", key: e.key, code: e.code });
      } else {
        sendInput({ type: "keydown", key: e.key, code: e.code });
      }
    });

    canvas.addEventListener("keyup", function(e) {
      e.preventDefault();
      // Don't send keyup for keys we handled as keypress (they include their own keyup)
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) return;
      sendInput({ type: "keyup", key: e.key, code: e.code });
    });
  }

  // Validate share token if provided
  if (shareToken) {
    fetch(`/share/validate?token=${encodeURIComponent(shareToken)}`)
      .then(r => {
        if (!r.ok) {
          errorMsg.textContent = "Invalid or expired share link.";
          errorMsg.style.display = "block";
          document.getElementById("container").style.display = "none";
          return;
        }
        connect();
      })
      .catch(() => connect()); // If validate endpoint doesn't exist yet, try connecting anyway
  } else {
    connect();
  }
})();
</script>
</body>
</html>
