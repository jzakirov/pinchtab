version: 2

before:
  hooks:
    - ./scripts/build-dashboard.sh

builds:
  - main: ./cmd/pinchtab
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # Output bare binaries directly (no archives)
  # Note: goreleaser auto-adds .exe for Windows, so don't include it in the template
  - format: binary
    name_template: "pinchtab-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: pinchtab
    repository:
      owner: pinchtab
      name: homebrew-tap
      branch: "brew-{{ .ProjectName }}-{{ .Version }}"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: pinchtab
          name: homebrew-tap
          branch: main
    directory: Formula
    homepage: "https://pinchtab.com"
    description: "High-performance browser automation bridge and multi-instance orchestrator for AI agents"
    license: "MIT"
    test: |
      system "#{bin}/pinchtab version"
    install: |
      bin.install "pinchtab"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^chore:'

dockers:
  - image_templates:
      - "ghcr.io/pinchtab/pinchtab:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/pinchtab/pinchtab"
    goos: linux
    goarch: amd64
  - image_templates:
      - "ghcr.io/pinchtab/pinchtab:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/pinchtab/pinchtab"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/pinchtab/pinchtab:{{ .Version }}"
    image_templates:
      - "ghcr.io/pinchtab/pinchtab:{{ .Version }}-amd64"
      - "ghcr.io/pinchtab/pinchtab:{{ .Version }}-arm64"
  - name_template: "ghcr.io/pinchtab/pinchtab:latest"
    image_templates:
      - "ghcr.io/pinchtab/pinchtab:{{ .Version }}-amd64"
      - "ghcr.io/pinchtab/pinchtab:{{ .Version }}-arm64"

release:
  github:
    owner: pinchtab
    name: pinchtab
